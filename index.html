<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus — Todo</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:       #007FFF;
      --primary-light: #e8f2ff;
      --primary-hover: #0066d6;
      --bg:            #f0f4f9;
      --card:          #ffffff;
      --text:          #1a202c;
      --text-sub:      #64748b;
      --text-muted:    #a0aec0;
      --border:        #e8edf4;
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:     0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --radius-sm:     8px;
      --radius-md:     12px;
      --radius-lg:     16px;
      --pri-low:       #10b981;
      --pri-med:       #f59e0b;
      --pri-high:      #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Container ───────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      margin-bottom: 28px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-title h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .date-badge {
      font-size: 12px;
      color: var(--text-sub);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-weight: 500;
    }

    /* ── Filter Tabs ─────────────────────────────────── */
    .filter-tabs {
      display: flex;
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .filter-tabs button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-sub);
      background: transparent;
      transition: all 0.18s ease;
      position: relative;
    }

    .filter-tabs button .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      color: var(--text-sub);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      margin-left: 5px;
      transition: all 0.18s ease;
    }

    .filter-tabs button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,127,255,0.3);
    }

    .filter-tabs button.active .tab-count {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* ── Input Area ──────────────────────────────────── */
    .input-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    #todo-input {
      width: 100%;
      padding: 11px 14px 11px 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      font-family: inherit;
    }

    #todo-input::placeholder { color: var(--text-muted); }

    #todo-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,127,255,0.1);
    }

    #add-btn {
      padding: 11px 18px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,127,255,0.25);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #add-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 12px rgba(0,127,255,0.35);
    }

    #add-btn:active { transform: scale(0.97); }

    #add-btn svg {
      width: 14px;
      height: 14px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* Priority selector */
    .priority-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .priority-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-right: 2px;
    }

    .priority-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-sub);
      transition: all 0.15s;
    }

    .priority-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-btn[data-p="low"]    .dot { background: var(--pri-low); }
    .priority-btn[data-p="medium"] .dot { background: var(--pri-med); }
    .priority-btn[data-p="high"]   .dot { background: var(--pri-high); }

    .priority-btn.selected[data-p="low"]    { border-color: var(--pri-low);  background: #ecfdf5; color: #065f46; }
    .priority-btn.selected[data-p="medium"] { border-color: var(--pri-med);  background: #fffbeb; color: #92400e; }
    .priority-btn.selected[data-p="high"]   { border-color: var(--pri-high); background: #fef2f2; color: #991b1b; }

    /* ── Task List ───────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Task Item ───────────────────────────────────── */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      cursor: default;
      transition: box-shadow 0.18s, border-color 0.18s, opacity 0.25s;
      animation: slideDown 0.22s cubic-bezier(0.22,1,0.36,1);
      position: relative;
      overflow: hidden;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .todo-item:hover {
      box-shadow: var(--shadow-md);
      border-color: #d4e3f7;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    /* Custom checkbox */
    .checkbox-wrap {
      position: relative;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 1;
      margin: 0;
    }

    .checkbox-visual {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      pointer-events: none;
    }

    .checkbox-wrap input:checked ~ .checkbox-visual {
      background: var(--primary);
      border-color: var(--primary);
    }

    .checkbox-wrap input:checked ~ .checkbox-visual svg {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox-visual svg {
      width: 11px;
      height: 11px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }

    .checkbox-wrap:hover .checkbox-visual {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,127,255,0.1);
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 14px;
      font-weight: 450;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
      transition: color 0.25s;
      position: relative;
    }

    .task-text::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1.5px;
      background: var(--text-muted);
      transition: width 0.3s ease;
    }

    .todo-item.done .task-text {
      color: var(--text-muted);
    }

    .todo-item.done .task-text::after {
      width: 100%;
    }

    /* Priority dot */
    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .priority-dot[data-p="low"]    { background: var(--pri-low); }
    .priority-dot[data-p="medium"] { background: var(--pri-med); }
    .priority-dot[data-p="high"]   { background: var(--pri-high); }

    /* Hover actions */
    .item-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .item-actions {
      opacity: 1;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      color: var(--text-muted);
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn.delete:hover {
      background: #fef2f2;
      color: var(--pri-high);
    }

    /* ── Empty State ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .empty-state .empty-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-state p {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
    }

    .empty-state span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }

    #count-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }

    .clear-btn:hover {
      background: #fef2f2;
      color: var(--pri-high);
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">
        <div class="app-icon">
          <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <h1>Focus</h1>
      </div>
      <div class="date-badge" id="date-badge"></div>
    </div>

    <div class="filter-tabs">
      <button class="active" data-filter="all">All <span class="tab-count" id="count-all">0</span></button>
      <button data-filter="active">Active <span class="tab-count" id="count-active">0</span></button>
      <button data-filter="done">Done <span class="tab-count" id="count-done">0</span></button>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-row">
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" />
      </div>
      <button id="add-btn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>
    <div class="priority-row">
      <span class="priority-label">Priority</span>
      <button class="priority-btn selected" data-p="low"><span class="dot"></span>Low</button>
      <button class="priority-btn" data-p="medium"><span class="dot"></span>Medium</button>
      <button class="priority-btn" data-p="high"><span class="dot"></span>High</button>
    </div>
  </div>

  <!-- List -->
  <div class="section-label" id="section-label">Tasks</div>
  <ul class="todo-list" id="todo-list"></ul>

  <!-- Footer -->
  <div class="footer">
    <span id="count-label"></span>
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>

</div>

<script>
  // ── State ────────────────────────────────────────────
  let todos    = JSON.parse(localStorage.getItem('todos-v2') || '[]');
  let filter   = 'all';
  let priority = 'low';

  // ── DOM refs ─────────────────────────────────────────
  const input      = document.getElementById('todo-input');
  const addBtn     = document.getElementById('add-btn');
  const list       = document.getElementById('todo-list');
  const countLabel = document.getElementById('count-label');
  const clearBtn   = document.getElementById('clear-btn');
  const filterBtns = document.querySelectorAll('.filter-tabs button');
  const priBtns    = document.querySelectorAll('.priority-btn');
  const dateBadge  = document.getElementById('date-badge');
  const sectionLbl = document.getElementById('section-label');

  // ── Date badge ───────────────────────────────────────
  const now = new Date();
  dateBadge.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  // ── Priority selector ─────────────────────────────────
  priBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      priority = btn.dataset.p;
      priBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // ── Core helpers ─────────────────────────────────────
  function save() {
    localStorage.setItem('todos-v2', JSON.stringify(todos));
  }

  function counts() {
    return {
      all:    todos.length,
      active: todos.filter(t => !t.done).length,
      done:   todos.filter(t =>  t.done).length,
    };
  }

  function updateCounts() {
    const c = counts();
    document.getElementById('count-all').textContent    = c.all;
    document.getElementById('count-active').textContent = c.active;
    document.getElementById('count-done').textContent   = c.done;
    countLabel.textContent = c.active === 0
      ? 'All done!'
      : `${c.active} task${c.active > 1 ? 's' : ''} remaining`;
  }

  // ── Render ────────────────────────────────────────────
  function render() {
    const filtered = todos.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.done :
      t.done
    );

    updateCounts();

    const labels = { all: 'Tasks', active: 'In Progress', done: 'Completed' };
    sectionLbl.textContent = labels[filter];

    list.innerHTML = '';

    if (filtered.length === 0) {
      const messages = {
        all:    ['No tasks yet', 'Add something to get started'],
        active: ['All caught up!', 'No active tasks right now'],
        done:   ['Nothing completed yet', 'Finish a task to see it here'],
      };
      const [title, sub] = messages[filter];
      list.innerHTML = `
        <li class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <p>${title}</p>
          <span>${sub}</span>
        </li>`;
      return;
    }

    filtered.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' done' : '');
      li.dataset.id = todo.id;

      li.innerHTML = `
        <label class="checkbox-wrap">
          <input type="checkbox" ${todo.done ? 'checked' : ''}>
          <div class="checkbox-visual">
            <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
          </div>
        </label>
        <span class="task-text">${escHtml(todo.text)}</span>
        <div class="priority-dot" data-p="${todo.priority}" title="${todo.priority} priority"></div>
        <div class="item-actions">
          <button class="action-btn delete" title="Delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>`;

      li.querySelector('input[type="checkbox"]')
        .addEventListener('change', () => toggle(todo.id));
      li.querySelector('.action-btn.delete')
        .addEventListener('click', () => remove(todo.id));

      list.appendChild(li);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ───────────────────────────────────────────
  function addTodo() {
    const text = input.value.trim();
    if (!text) { input.focus(); shake(input); return; }
    todos.unshift({ id: Date.now(), text, done: false, priority });
    input.value = '';
    input.focus();
    save();
    render();
  }

  function toggle(id) {
    todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save();
    render();
  }

  function remove(id) {
    const el = list.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      el.style.opacity = '0';
      el.style.transform = 'translateX(12px)';
      setTimeout(() => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, 200);
    }
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.transition = 'border-color 0.15s';
    el.style.borderColor = 'var(--pri-high)';
    setTimeout(() => { el.style.borderColor = ''; }, 600);
  }

  // ── Events ────────────────────────────────────────────
  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearBtn.addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  // ── Init ──────────────────────────────────────────────
  render();
</script>
</body>
</html>
