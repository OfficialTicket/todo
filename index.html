<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .todo-item .delete-btn:hover {
      color: #e74c3c;
      background: #ffeaea;
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #ffeaea;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 15px;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Todo</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." />
      <button id="add-btn">+</button>
    </div>
    <div class="filters">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">진행 중</button>
      <button data-filter="done">완료</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="footer">
      <span id="count-label"></span>
      <button class="clear-btn" id="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('todo-list');
    const countLabel = document.getElementById('count-label');
    const clearBtn = document.getElementById('clear-btn');
    const filterBtns = document.querySelectorAll('.filters button');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">할 일이 없습니다.</li>';
      } else {
        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = todo.done;
          cb.addEventListener('change', () => toggle(todo.id));

          const text = document.createElement('span');
          text.textContent = todo.text;

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '×';
          del.addEventListener('click', () => remove(todo.id));

          li.appendChild(cb);
          li.appendChild(text);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      const active = todos.filter(t => !t.done).length;
      countLabel.textContent = `남은 항목 ${active}개`;
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    clearBtn.addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
